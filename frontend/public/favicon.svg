<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Deep navy background circle -->
  <circle cx="16" cy="16" r="16" fill="#0d2240"/>
  <!-- Strait/water waves (two arcs suggesting the chokepoint) -->
