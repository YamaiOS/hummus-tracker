  <!-- Tanker superstructure -->
  <rect x="20" y="13" width="4" height="3" fill="#c9a432" opacity="0.9"/>
  <!-- Funnel / smokestack -->
  <rect x="21.5" y="11" width="2" height="2.5" fill="#c9a432"/>
  <!-- Oil drop above -->
  <path d="M10 8 Q10 5 13 5 Q16 5 16 8 Q16 11 13 12 Q10 11 10 8 Z" fill="#c9a432" opacity="0.85"/>
