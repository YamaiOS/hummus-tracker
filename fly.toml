app = "hummus-tracker"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine alive so the in-process hourly snapshot scheduler keeps firing.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[env]
  PYTHONUNBUFFERED = "1"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
