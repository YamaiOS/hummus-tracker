app = "hummus-tracker"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle (~$0 compute). Visitor requests auto-wake the machine,
  # which serves the persisted snapshot from the volume. Refresh is driven by an
  # external hourly cron hitting POST /api/internal/refresh.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  PYTHONUNBUFFERED = "1"
  DATA_DIR = "/data"

# Persistent volume so the SQLite DB + snapshots/*.json survive machine stop.
[mounts]
  source = "hummus_data"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
